<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LINZ Title Explorer</title>
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <!-- Leaflet for address map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { font-family: Inter, system-ui, sans-serif; margin: 0; background: #f5f7fb; color: #1f2430; }
      .wrap { max-width: 1280px; margin: 20px auto; padding: 0 16px; }
      h2 { margin: 0 0 14px; font-size: 20px; color: #1a2340; }
      .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }

      /* Search modes */
      .search-modes { display:flex; gap:6px; margin-bottom:10px; }
      .mode-btn { padding:7px 14px; border:1px solid #d8dce7; border-radius:8px; background:#fff; cursor:pointer; font-size:13px; color:#687086; }
      .mode-btn.active { background:#2f6ae6; color:#fff; border-color:#2f6ae6; }

      /* Toolbar */
      .toolbar { display:flex; gap:8px; padding:14px; flex-wrap:wrap; }
      .toolbar input { flex:1; min-width:180px; padding:11px 14px; border:1px solid #d8dce7; border-radius:10px; font-size:14px; }
      .toolbar select { padding:11px; border:1px solid #d8dce7; border-radius:10px; font-size:13px; }
      .btn { padding:11px 14px; border:0; border-radius:10px; background:#2f6ae6; color:#fff; cursor:pointer; font-size:13px; white-space:nowrap; }
      .btn:hover { background:#2257c9; }
      .btn.secondary { background:#e8edf8; color:#2f6ae6; }
      .btn.secondary:hover { background:#d5defc; }
      .status { font-size:13px; color:#687086; padding: 0 14px 12px; }

      /* Address search bar */
      .addr-toolbar { padding:14px; display:flex; gap:8px; }
      .addr-toolbar input { flex:1; padding:11px 14px; border:1px solid #d8dce7; border-radius:10px; font-size:14px; }

      /* Layout */
      .grid { margin-top:14px; display:grid; grid-template-columns: 1fr 1.5fr; gap:14px; }
      .list { max-height:75vh; overflow:auto; }
      .item { padding:11px 14px; border-bottom:1px solid #edf0f6; cursor:pointer; }
      .item:hover { background:#f8faff; }
      .item.active { background:#eaf1ff; border-left:3px solid #2f6ae6; }
      .item .title-tag { font-weight:600; font-size:14px; }
      .item .addr-tag { font-size:13px; color:#2f6ae6; margin-top:2px; }
      .muted { color:#687086; font-size:12px; }
      .badge { display:inline-block; padding:1px 7px; border-radius:20px; font-size:11px; font-weight:600; }
      .badge-live { background:#dcfce7; color:#166534; }
      .badge-hist { background:#fef3c7; color:#92400e; }
      .badge-other { background:#e5e7eb; color:#374151; }

      /* Detail panel */
      .details { padding:14px; }
      .kpis { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin: 10px 0 14px; }
      .kpi { background:#f7f9fe; border:1px solid #e4e9f5; border-radius:10px; padding:10px; }
      .kpi .label { font-size:11px; color:#687086; margin-bottom:4px; }
      .kpi .v { font-size:22px; font-weight:700; color:#1a2340; }
      .tabs { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
      .tab { padding:7px 12px; border-radius:8px; border:1px solid #d7deef; background:#fff; cursor:pointer; font-size:13px; }
      .tab.active { background:#2f6ae6; color:#fff; border-color:#2f6ae6; }
      .panel { border:1px solid #e6eaf4; border-radius:10px; padding:10px; max-height:58vh; overflow:auto; }
      .row { padding:8px 0; border-bottom:1px solid #edf0f6; font-size:13px; }
      .row:last-child { border-bottom:0; }
      .addr-chip { display:inline-block; background:#f0f5ff; border:1px solid #c7d8ff; border-radius:8px; padding:6px 12px; margin:4px 2px; font-size:13px; }

      /* Address result card */
      .addr-item { padding:10px 14px; border-bottom:1px solid #edf0f6; cursor:pointer; }
      .addr-item:hover { background:#f8faff; }
      .addr-item.active { background:#eaf1ff; border-left:3px solid #2f6ae6; }
      .addr-full { font-size:14px; font-weight:500; }
      .addr-meta { font-size:12px; color:#687086; margin-top:2px; }

      @media (max-width: 980px){ .grid{grid-template-columns:1fr;} .kpis{grid-template-columns:repeat(2,1fr);} }

      /* Loading overlay */
      .details { position: relative; }
      .loading-overlay {
        display: none;
        position: absolute; inset: 0;
        background: rgba(255,255,255,0.65);
        backdrop-filter: blur(3px);
        -webkit-backdrop-filter: blur(3px);
        border-radius: 12px;
        z-index: 10;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 10px;
      }
      .loading-overlay.active { display: flex; }
      .spinner {
        width: 36px; height: 36px;
        border: 3px solid #d0daf5;
        border-top-color: #2f6ae6;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      .loading-label { font-size: 13px; color: #2f6ae6; font-weight: 500; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Address map */
      #addressMap { height: 240px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #e6eaf4; }
      .map-credit { font-size: 11px; color: #687086; margin-bottom: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h2>🗺 LINZ Title Explorer</h2>

      <!-- Search mode toggle -->
      <div class="search-modes">
        <button class="mode-btn" id="modeTitleBtn" onclick="setMode('title')">Title / Instrument Search</button>
        <button class="mode-btn active" id="modeAddrBtn" onclick="setMode('address')">🏠 Address Search</button>
      </div>

      <!-- Title search toolbar -->
      <div class="card" id="titleToolbar" style="display:none">
        <div class="toolbar">
          <input id="q" placeholder="Search title no, address, appellation, owner..." />
          <select id="sortBy">
            <option value="issue_date">Issue Date</option>
            <option value="latest_lodged_date">Latest Lodged</option>
            <option value="instrument_count">Instruments</option>
            <option value="encumbrance_count">Encumbrances</option>
            <option value="title_no">Title No</option>
          </select>
          <select id="sortDir">
            <option value="DESC">Desc</option>
            <option value="ASC">Asc</option>
          </select>
          <button class="btn" id="searchBtn">Search</button>
          <button class="btn secondary" id="prevBtn">◀</button>
          <button class="btn secondary" id="nextBtn">▶</button>
          <button class="btn secondary" id="csvBtn">Export CSV</button>
        </div>
        <div class="status" id="status">Ready</div>
      </div>

      <!-- Address search toolbar -->
      <div class="card" id="addrToolbar">
        <div class="addr-toolbar">
          <input id="addrQ" placeholder="e.g.  42 Willis Street, Wellington  or  Thorndon  or  6011" />
          <button class="btn" onclick="searchByAddress()">Search</button>
        </div>
        <div class="status" id="addrStatus">Enter a street address, suburb or postcode</div>
      </div>

      <div class="grid">
        <!-- Left: result list -->
        <div class="card list" id="results"></div>

        <!-- Right: detail panel -->
        <div class="card details">
          <div class="loading-overlay" id="loadingOverlay">
            <div class="spinner"></div>
            <div class="loading-label" id="loadingLabel">Loading…</div>
          </div>
          <div id="header"><b>Select a title</b></div>
          <div class="kpis" id="kpis"></div>
          <div class="tabs">
            <button class="tab active" data-tab="summary">Summary</button>
            <button class="tab" data-tab="address">Address</button>
            <button class="tab" data-tab="instruments">Instruments</button>
            <button class="tab" data-tab="encumbrances">Encumbrances</button>
            <button class="tab" data-tab="lineage">Lineage</button>
            <button class="tab" data-tab="instrument-search">Instrument Search</button>
          </div>
          <div class="panel" id="panel"><div class="muted" style="padding:12px">Select a title to view details</div></div>
        </div>
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────
      let mode = 'title';
      let selectedTitle = null;
      let detail = null;
      let titleAddresses = [];
      let instruments = [];
      let encumbrances = [];
      let lineage = { prior: [], follow_on: [] };
      let lineageGraph = { nodes: [], edges: [] };
      let ancestors = { ancestors: [], count: 0 };
      let instrumentSearchResults = [];
      let offset = 0;
      const limit = 100;
      let currentTab = 'summary';
      let leafletMap = null;
      let leafletMarker = null;

      // ── Utils ──────────────────────────────────────────────────────────
      function esc(v){ return (v ?? '').toString().replace(/[&<>"']/g, s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s])); }

      function badge(status, desc){
        const s = (status || '').toUpperCase();
        const label = desc || s;
        if (s === 'LIVE') return `<span class='badge badge-live'>${esc(label)}</span>`;
        if (s === 'HIST' || s === 'CNCV' || s === 'CNCD') return `<span class='badge badge-hist'>${esc(label)}</span>`;
        return `<span class='badge badge-other'>${esc(label)}</span>`;
      }

      // ── Mode switching ─────────────────────────────────────────────────
      function setMode(m){
        mode = m;
        document.getElementById('modeTitleBtn').classList.toggle('active', m === 'title');
        document.getElementById('modeAddrBtn').classList.toggle('active', m === 'address');
        document.getElementById('titleToolbar').style.display = m === 'title' ? '' : 'none';
        document.getElementById('addrToolbar').style.display  = m === 'address' ? '' : 'none';
        document.getElementById('results').innerHTML = '';
        if (m === 'address') document.getElementById('addrQ').focus();
        else document.getElementById('q').focus();
      }

      // ── Tab switching ──────────────────────────────────────────────────
      function setActiveTab(tab){
        currentTab = tab;
        document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      }

      function renderCurrentTab(){
        if (currentTab === 'summary')          renderSummary();
        else if (currentTab === 'address')     renderAddressTab();
        else if (currentTab === 'instruments') renderInstruments();
        else if (currentTab === 'encumbrances')renderEncumbrances();
        else if (currentTab === 'lineage')     renderLineage();
        else if (currentTab === 'instrument-search') renderInstrumentSearch();
      }

      // ── KPIs ───────────────────────────────────────────────────────────
      function renderKpis(){
        if (!detail) { document.getElementById('kpis').innerHTML = ''; return; }
        const vals = [
          ['Instruments', detail.instrument_count ?? 0],
          ['Encumbrances', detail.encumbrance_count ?? 0],
          ['Estates', detail.estate_count ?? 0],
          ['Parcels', detail.parcel_count ?? 0],
        ];
        document.getElementById('kpis').innerHTML = vals.map(([k,v]) =>
          `<div class='kpi'><div class='label'>${k}</div><div class='v'>${v}</div></div>`
        ).join('');
      }

      // ── Summary tab ────────────────────────────────────────────────────
      function renderSummary(){
        if (!detail) { document.getElementById('panel').innerHTML = '<div class="muted" style="padding:12px">Select a title</div>'; return; }
        const addr = detail.primary_address ? `<div class='addr-chip'>📍 ${esc(detail.primary_address)}</div>` : '';
        const appel = detail.appellations ? `<div class='row'><b>Appellation:</b> ${esc(detail.appellations)}</div>` : '';
        const owner = detail.proprietors   ? `<div class='row'><b>Owner(s):</b> ${esc(detail.proprietors)}</div>` : '';
        const maoriLand = detail.maori_land === 'Y' ? 'Yes' : 'No';
        document.getElementById('panel').innerHTML = `
          <div class='row'><b>Title No:</b> ${esc(detail.title_no)} ${badge(detail.title_status, detail.title_status_desc)}</div>
          <div class='row'><b>Type:</b> ${esc(detail.title_type_desc || detail.title_type || '—')} | <b>Register:</b> ${esc(detail.register_type_desc || detail.register_type || '—')} | <b>Guarantee:</b> ${esc(detail.guarantee_status_desc || detail.guarantee_status || '—')}</div>
          <div class='row'><b>Issue Date:</b> ${esc(detail.issue_date || '—')} | <b>Māori Land:</b> ${esc(maoriLand)}</div>
          <div class='row'><b>Land District:</b> ${esc(detail.land_district_name || detail.ldt_loc_id || '—')}</div>
          <div class='row'><b>Estate Types:</b> ${esc(detail.estate_types_desc || detail.estate_types || '—')}</div>
          ${owner}
          ${appel}
          <div class='row'><b>Latest Instrument:</b> ${esc(detail.latest_inst_no || '—')} ${detail.latest_inst_type_desc ? `<span class='muted'>(${esc(detail.latest_inst_type_desc)})</span>` : ''} — ${esc(detail.latest_instrument_date ? detail.latest_instrument_date.slice(0,10) : '—')}</div>
          <div class='row'><b>Prior Title:</b> ${detail.prior_title_no ? `<a href='#' onclick="window.pickTitle('${esc(detail.prior_title_no)}');return false">${esc(detail.prior_title_no)}</a>` : '—'}</div>
          ${addr ? `<div class='row'><b>Address:</b><br/>${addr}</div>` : ''}
        `;
      }

      // ── Address tab ────────────────────────────────────────────────────
      function renderAddressTab(){
        const panel = document.getElementById('panel');
        if (!selectedTitle) { panel.innerHTML = '<div class="muted" style="padding:12px">Select a title first</div>'; return; }
        if (!titleAddresses.length) {
          panel.innerHTML = '<div class="muted" style="padding:12px">No address records linked to this title.<br><small>Address data requires TITLE_PARCEL_ASSOCIATION to be loaded.</small></div>';
          return;
        }
        const chips = titleAddresses.map(a => `
          <div class='row'>
            <div class='addr-chip'>📍 ${esc(a.full_address)}</div>
            <div class='muted'>Parcel: ${esc(a.parcel_id)} | Suburb: ${esc(a.suburb || '—')} | City: ${esc(a.city || '—')} | Postcode: ${esc(a.postcode || '—')}</div>
          </div>
        `).join('');
        panel.innerHTML = `
          <div id='addressMap'></div>
          <div class='map-credit'>Map data © <a href='https://www.openstreetmap.org/copyright' target='_blank'>OpenStreetMap</a> contributors</div>
          ${chips}
        `;
        // Initialise Leaflet map on first render; afterwards just invalidate size
        if (!leafletMap) {
          leafletMap = L.map('addressMap').setView([-41.3, 174.8], 6);
          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
          }).addTo(leafletMap);
        } else {
          document.getElementById('addressMap').appendChild(leafletMap.getContainer());
          leafletMap.invalidateSize();
        }
        // Geocode the first address via Nominatim (best-effort)
        const addr = titleAddresses[0];
        const query = encodeURIComponent((addr.full_address || '') + ', New Zealand');
        fetch(`https://nominatim.openstreetmap.org/search?q=${query}&format=json&limit=1`, {
          headers: { 'Accept-Language': 'en' }
        })
          .then(r => r.json())
          .then(results => {
            if (!results.length) return;
            const lat = parseFloat(results[0].lat);
            const lon = parseFloat(results[0].lon);
            leafletMap.setView([lat, lon], 16);
            if (leafletMarker) { leafletMarker.remove(); leafletMarker = null; }
            leafletMarker = L.marker([lat, lon])
              .addTo(leafletMap)
              .bindPopup(esc(addr.full_address))
              .openPopup();
          })
          .catch(() => {}); // geocoding is best-effort
      }

      // ── Instruments tab ────────────────────────────────────────────────
      function renderInstruments(){
        const panel = document.getElementById('panel');
        if (!instruments.length) { panel.innerHTML = '<div class="muted" style="padding:12px">No instruments found.</div>'; return; }
        panel.innerHTML =
          `<div class='row'><button onclick="window.exportTitleInstruments()" class='btn' style='padding:6px 10px;font-size:12px'>Export CSV</button></div>` +
          instruments.map(i => `
            <div class='row'>
              <div><b>${esc(i.inst_no || i.tin_id)}</b> <span class='muted'>${esc(i.status || '')}</span></div>
              <div class='muted'>${esc(i.transaction_type_desc || i.trt_type || '')} | ${esc(i.lodged_datetime || '—')}</div>
            </div>
          `).join('');
      }

      // ── Encumbrances tab ───────────────────────────────────────────────
      function renderEncumbrances(){
        const panel = document.getElementById('panel');
        if (!encumbrances.length) { panel.innerHTML = '<div class="muted" style="padding:12px">No encumbrances found.</div>'; return; }
        panel.innerHTML =
          `<div class='row'><button onclick="window.exportTitleEncumbrances()" class='btn' style='padding:6px 10px;font-size:12px'>Export CSV</button></div>` +
          encumbrances.map(e => `
            <div class='row'>
              <div><b>ENC ${esc(e.enc_id)}</b> ${badge(e.encumbrance_status || e.title_encumbrance_status)}</div>
              <div class='muted'>Term: ${esc(e.encumbrance_term || '—')} | Beneficiary: ${esc(e.encumbrancee_name || 'n/a')}</div>
            </div>
          `).join('');
      }

      // ── Lineage tab ────────────────────────────────────────────────────
      function renderLineage(){
        const p = (lineage.prior || []).slice(0, 8);
        const f = (lineage.follow_on || []).slice(0, 8);
        const nodeH = 36, curH = 38;
        const w = 760, h = 260, cx = 380, cy = 111;
        const leftX = 120, rightX = 580;
        const truncAddr = s => s && s.length > 28 ? s.slice(0, 26) + '…' : (s || '');
        const spacing = (nodes, base) => nodes.map((x,i) => ({ label: x.related_title, address: x.address || '', addressInherited: !!x.address_inherited, x: base, y: 20 + i * Math.max(nodeH + 8, 180 / Math.max(1, nodes.length)) }));
        const priorNodes  = spacing(p, leftX);
        const followNodes = spacing(f, rightX);
        const lines = [
          ...priorNodes.map(n=>`<line x1='${n.x+100}' y1='${n.y+nodeH/2}' x2='${cx-90}' y2='${cy+curH/2}' stroke='#9db1e5' stroke-width='1.5'/>`),
          ...followNodes.map(n=>`<line x1='${cx+90}' y1='${cy+curH/2}' x2='${n.x}' y2='${n.y+nodeH/2}' stroke='#9db1e5' stroke-width='1.5'/>`),
        ].join('');
        const makeRects = (nodes) => nodes.map(n => {
          const enc = encodeURIComponent(n.label);
          const addr = truncAddr(n.address);
          const addrColor = n.addressInherited ? '#aaa' : '#888';
          const addrStyle = n.addressInherited ? 'font-style="italic"' : '';
          return `<a href='#' onclick="window.pickTitle(decodeURIComponent('${enc}'));return false;">
            <rect x='${n.x}' y='${n.y}' rx='6' width='180' height='${nodeH}' fill='#f5f8ff' stroke='#d3dff8'/>
            <text x='${n.x+90}' y='${n.y+14}' text-anchor='middle' font-size='11' fill='#334'>${esc(n.label)}</text>
            ${addr ? `<text x='${n.x+90}' y='${n.y+27}' text-anchor='middle' font-size='9' fill='${addrColor}' ${addrStyle}>${esc(addr)}</text>` : ''}
          </a>`;
        }).join('');
        const currentAddr = truncAddr((titleAddresses[0]?.full_address) || '');

        // Full ancestry chain — sorted oldest-first (highest depth first)
        const chain = (ancestors.ancestors || []).slice().sort((a,b) => b.depth - a.depth);
        const chainHtml = chain.length === 0 ? '' : `
          <div style='margin-top:16px'>
            <div style='font-weight:600;margin-bottom:8px'>Full ancestry chain <span class='muted'>(${chain.length} prior title${chain.length===1?'':'s'})</span></div>
            <div style='overflow-x:auto;padding-bottom:6px'>
              <div style='display:flex;align-items:center;gap:0;min-width:max-content'>
                ${chain.map((a, i) => {
                  const enc = encodeURIComponent(a.title_no);
                  const date = a.issue_date ? a.issue_date.slice(0,10) : '';
                  const isLast = i === chain.length - 1;
                  return `<a href='#' onclick="window.pickTitle(decodeURIComponent('${enc}'));return false;"
                      style='display:inline-flex;flex-direction:column;align-items:center;padding:5px 10px;
                             background:#f5f8ff;border:1px solid #d3dff8;border-radius:6px;
                             text-decoration:none;min-width:110px;text-align:center'>
                      <span style='font-size:11px;font-weight:600;color:#2f6ae6'>${esc(a.title_no)}</span>
                      ${date ? `<span style='font-size:10px;color:#888'>${esc(date)}</span>` : ''}
                    </a>${isLast ? '' : `<span style='color:#9db1e5;padding:0 4px;font-size:16px'>→</span>`}`;
                }).join('')}
                <span style='color:#9db1e5;padding:0 4px;font-size:16px'>→</span>
                <div style='display:inline-flex;flex-direction:column;align-items:center;padding:5px 10px;
                            background:#2f6ae6;border-radius:6px;min-width:110px;text-align:center'>
                  <span style='font-size:11px;font-weight:600;color:#fff'>${esc(detail?.title_no || selectedTitle)}</span>
                  <span style='font-size:10px;color:#c8d8f8'>current</span>
                </div>
              </div>
            </div>
          </div>`;

        document.getElementById('panel').innerHTML = `
          <div class='row'><b>Title Lineage</b> <span class='muted'>(click nodes to navigate)</span></div>
          <svg viewBox='0 0 ${w} ${h}' width='100%' height='${h}' style='overflow:visible'>
            ${lines}
            ${makeRects(priorNodes)}
            <rect x='${cx-90}' y='${cy}' rx='8' width='180' height='${curH}' fill='#2f6ae6'/>
            <text x='${cx}' y='${cy+14}' text-anchor='middle' font-size='12' fill='white'>${esc(detail?.title_no || selectedTitle)}</text>
            ${currentAddr ? `<text x='${cx}' y='${cy+28}' text-anchor='middle' font-size='9' fill='#c8d8f8'>${esc(currentAddr)}</text>` : ''}
            ${makeRects(followNodes)}
          </svg>
          <div class='muted' style='padding:4px 0'>Prior: ${(lineage.prior||[]).length} | Follow-on: ${(lineage.follow_on||[]).length}</div>
          ${chainHtml}
        `;
      }

      // ── Instrument Search tab ──────────────────────────────────────────
      function renderInstrumentSearch(){
        const rows = instrumentSearchResults.map(i => `
          <div class='row'>
            <div><b>${esc(i.inst_no || i.tin_id)}</b> <span class='muted'>${esc(i.status || '')}</span></div>
            <div class='muted'>${esc(i.transaction_type_description || i.trt_type || '')} | ${esc(i.lodged_datetime || '—')}</div>
            <div class='muted'>Titles: ${(i.title_nos||[]).slice(0,6).map(t=>`<a href='#' onclick="window.pickTitle('${esc(t)}');return false">${esc(t)}</a>`).join(', ') || '—'}</div>
          </div>
        `).join('') || `<div class='muted' style='padding:8px'>Enter an instrument number and click Find.</div>`;

        document.getElementById('panel').innerHTML = `
          <div class='row'><b>Instrument Search</b></div>
          <div class='row' style='display:flex;gap:8px'>
            <input id='instQ' placeholder='e.g. 13502695.1 or DM' style='flex:1;padding:8px;border:1px solid #d8dce7;border-radius:8px'/>
            <button onclick='window.searchInstruments()' class='btn' style='padding:8px 10px;font-size:12px'>Find</button>
            <button onclick='window.exportInstrumentSearchCsv()' class='btn secondary' style='padding:8px 10px;font-size:12px'>CSV</button>
          </div>
          ${rows}
        `;
      }

      // ── Load a title ───────────────────────────────────────────────────
      function setLoading(on, label='Loading…'){
        const el = document.getElementById('loadingOverlay');
        document.getElementById('loadingLabel').textContent = label;
        el.classList.toggle('active', on);
      }

      // Fetch JSON from url; on HTTP error throw with the endpoint name + message.
      async function jFetch(url) {
        const r = await fetch(url);
        const data = await r.json().catch(() => ({ error: `HTTP ${r.status} (non-JSON response)` }));
        if (!r.ok || data.error) {
          const msg = data.error || `HTTP ${r.status}`;
          throw new Error(`${url.replace(/\?.*/, '')} — ${msg}`);
        }
        return data;
      }

      async function loadTitle(titleNo){
        selectedTitle = titleNo;
        // Reset map state so address tab re-geocodes for the new title
        if (leafletMarker) { leafletMarker.remove(); leafletMarker = null; }
        if (leafletMap) { leafletMap.setView([-41.3, 174.8], 6); }
        setLoading(true, `Loading ${titleNo}…`);
        document.getElementById('status').textContent = `Loading ${titleNo}…`;

        // Pass title_no as a query param (?no=) so slashes never appear in the URL path.
        // encodeURIComponent is safe here — query params are never touched by Vercel routing.
        const q = `no=${encodeURIComponent(titleNo)}`;
        let d, addr, inst, enc, lin, ling, anc;
        try {
          [d, addr, inst, enc, lin, ling, anc] = await Promise.all([
            jFetch(`/api/title?${q}`),
            jFetch(`/api/title/address?${q}`),
            jFetch(`/api/title/instruments?${q}`),
            jFetch(`/api/title/encumbrances?${q}`),
            jFetch(`/api/title/lineage?${q}`),
            jFetch(`/api/title/lineage/graph?${q}`),
            jFetch(`/api/title/lineage/ancestors?${q}`),
          ]);
        } catch (err) {
          setLoading(false);
          document.getElementById('status').textContent = `Error loading ${titleNo}`;
          document.getElementById('panel').innerHTML = `<div class='muted' style='padding:12px;color:#b91c1c'>Error: ${esc(String(err))}</div>`;
          return;
        } finally {
          setLoading(false);
        }

        detail = d;
        titleAddresses = addr.items || [];
        instruments   = inst.items || [];
        encumbrances  = enc.items  || [];
        lineage       = lin;
        lineageGraph  = ling;
        ancestors     = anc;

        document.getElementById('header').innerHTML = `<b>${esc(detail.title_no)}</b> ${badge(detail.title_status, detail.title_status_desc)} <span class='muted'>${esc(detail.title_type_desc || detail.title_type || '')} • ${esc(detail.land_district_name || '')}</span>`;
        renderKpis();
        setActiveTab('summary');
        renderSummary();
        document.getElementById('status').textContent = `Loaded ${titleNo}`;
      }

      // ── Title search ───────────────────────────────────────────────────
      async function search(){
        const q       = document.getElementById('q').value.trim();
        const sortBy  = document.getElementById('sortBy').value;
        const sortDir = document.getElementById('sortDir').value;
        document.getElementById('status').textContent = 'Searching…';

        let data;
        try {
          data = await fetch(`/api/search?q=${encodeURIComponent(q)}&limit=${limit}&offset=${offset}&sort_by=${sortBy}&sort_dir=${sortDir}`).then(r=>r.json());
        } catch { document.getElementById('status').textContent = 'Search failed'; return; }

        const resultsEl = document.getElementById('results');
        resultsEl.innerHTML = '';
        (data.items || []).forEach(row => {
          const div = document.createElement('div');
          div.className = 'item';
          div.innerHTML = `
            <div class='title-tag'>${esc(row.title_no)} ${badge(row.title_status, row.title_status_desc)}</div>
            <div class='muted'>${esc(row.title_type_desc || row.title_type || '')} • ${esc(row.register_type_desc || row.register_type || '')} • ${esc(row.issue_date ? row.issue_date.slice(0,10) : '—')}</div>
            ${row.primary_address ? `<div class='addr-tag'>📍 ${esc(row.primary_address)}</div>` : ''}
          `;
          div.onclick = () => {
            document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));
            div.classList.add('active');
            loadTitle(row.title_no);
          };
          resultsEl.appendChild(div);
        });
        document.getElementById('status').textContent = `${data.count || 0} result(s) (offset ${offset})`;
      }

      // ── Address search ─────────────────────────────────────────────────
      async function searchByAddress(){
        const q = document.getElementById('addrQ').value.trim();
        document.getElementById('addrStatus').textContent = 'Searching…';

        let data;
        try {
          data = await fetch(`/api/address/search?q=${encodeURIComponent(q)}&limit=100`).then(r=>r.json());
        } catch { document.getElementById('addrStatus').textContent = 'Search failed'; return; }

        const resultsEl = document.getElementById('results');
        resultsEl.innerHTML = '';

        if (!data.items || !data.items.length) {
          resultsEl.innerHTML = `<div class='muted' style='padding:14px'>No addresses found for "${esc(q)}"</div>`;
          document.getElementById('addrStatus').textContent = 'No results';
          return;
        }

        data.items.forEach(row => {
          const div = document.createElement('div');
          div.className = 'addr-item';
          div.innerHTML = `
            <div class='addr-full'>📍 ${esc(row.full_address)}</div>
            <div class='addr-meta'>Title: <b>${esc(row.title_no || '—')}</b> | Parcel: ${esc(row.parcel_id || '—')}</div>
          `;
          div.onclick = () => {
            document.querySelectorAll('.addr-item').forEach(x=>x.classList.remove('active'));
            div.classList.add('active');
            if (row.title_no) {
              loadTitle(row.title_no);
              setActiveTab('address');
            }
          };
          resultsEl.appendChild(div);
        });

        document.getElementById('addrStatus').textContent = `${data.count} result(s) — click an address to load its title`;
      }

      // ── Instrument search ──────────────────────────────────────────────
      async function searchInstruments(){
        const input = document.getElementById('instQ');
        const iq = (input?.value || '').trim();
        document.getElementById('status').textContent = 'Searching instruments…';
        const data = await fetch(`/api/instruments/search?q=${encodeURIComponent(iq)}&limit=100`).then(r=>r.json());
        instrumentSearchResults = data.items || [];
        document.getElementById('status').textContent = `${instrumentSearchResults.length} instrument result(s)`;
        renderInstrumentSearch();
      }

      // ── Exports ────────────────────────────────────────────────────────
      function exportCsv(){
        const q = document.getElementById('q').value.trim();
        const sortBy = document.getElementById('sortBy').value;
        const sortDir = document.getElementById('sortDir').value;
        window.location.href = `/api/search.csv?q=${encodeURIComponent(q)}&limit=5000&offset=${offset}&sort_by=${sortBy}&sort_dir=${sortDir}`;
      }

      // ── Global helpers for inline onclick handlers ─────────────────────
      window.searchInstruments = searchInstruments;
      window.pickTitle = async (titleNo) => { setMode('title'); await loadTitle(titleNo); };
      window.exportTitleInstruments = () => { if (selectedTitle) window.location.href = `/api/title/instruments.csv?no=${encodeURIComponent(selectedTitle)}`; };
      window.exportTitleEncumbrances = () => { if (selectedTitle) window.location.href = `/api/title/encumbrances.csv?no=${encodeURIComponent(selectedTitle)}`; };
      window.exportInstrumentSearchCsv = () => {
        const iq = (document.getElementById('instQ')?.value || '').trim();
        window.location.href = `/api/instruments/search.csv?q=${encodeURIComponent(iq)}&limit=5000`;
      };

      // ── Event listeners ────────────────────────────────────────────────
      document.getElementById('searchBtn').onclick = () => { offset = 0; search(); };
      document.getElementById('prevBtn').onclick = () => { offset = Math.max(0, offset - limit); search(); };
      document.getElementById('nextBtn').onclick = () => { offset += limit; search(); };
      document.getElementById('csvBtn').onclick = exportCsv;
      document.getElementById('q').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
      document.getElementById('addrQ')?.addEventListener('keydown', e => { if (e.key === 'Enter') searchByAddress(); });

      document.querySelectorAll('.tab').forEach(btn => {
        btn.onclick = () => {
          setActiveTab(btn.dataset.tab);
          renderCurrentTab();
        };
      });

      // Start in address search mode — no DB query until user searches
      setMode('address');
    </script>
  </body>
</html>
